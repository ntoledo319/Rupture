name: "Rupture AWS Deprecation Check"
description: "Check source and IaC for AWS runtime deprecation risks before they hit production"
author: "Rupture"
branding:
  icon: "alert-triangle"
  color: "orange"

inputs:
  kit:
    description: "Which kit to run: auto, all, lambda-lifeline, al2023-gate, or python-pivot"
    required: false
    default: "auto"
  path:
    description: "Repository path to scan"
    required: false
    default: "."
  format:
    description: "Reserved for CLI-compatible output formatting"
    required: false
    default: "markdown"
  fail-on:
    description: "Minimum threshold to fail on: low, medium, high, critical, or none"
    required: false
    default: "high"
  comment-pr:
    description: "Post a PR comment with the scan summary"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Run Rupture check
      id: scan
      shell: bash
      env:
        INPUT_KIT: ${{ inputs.kit }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: bash "$GITHUB_ACTION_PATH/apps/github-action/run.sh"

    - name: Comment PR
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require("fs");
          const reportPath = "${{ steps.scan.outputs.report_path }}";
          const body = fs.readFileSync(reportPath, "utf8");

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          });

    - name: Enforce threshold
      if: steps.scan.outputs.should_fail == 'true'
      shell: bash
      run: |
        echo "::error::Rupture found deprecation risks at or above the configured threshold."
        exit 1
