name: Mutation Testing (C3)

# Mutation testing is a quality SIGNAL, not a launch gate.
# It runs weekly + on demand, uploads reports as artifacts, and surfaces
# the score in the run summary. It does NOT fail the CI run on a low
# score — that's deliberate, because mutmut survives are usually a
# missing-test signal, not a regression. Address them in the next sprint.

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 3am
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        kit: [al2023-gate, python-pivot]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd kits/${{ matrix.kit }}
          pip install -e ".[dev]"
          pip install 'mutmut>=3.0,<4'

      - name: Verify baseline tests pass
        run: |
          cd kits/${{ matrix.kit }}
          python -m pytest -q --no-header

      - name: Run mutation tests
        id: mutmut
        continue-on-error: true
        run: |
          cd kits/${{ matrix.kit }}
          # mutmut returns non-zero whenever any mutant survives; that's
          # expected output, not a failure of the run itself.
          mutmut run || true
          mutmut results > mutation_report.txt 2>&1 || true
          echo "----- report start -----"
          cat mutation_report.txt
          echo "----- report end -----"

      - name: Compute mutation score
        id: score
        run: |
          cd kits/${{ matrix.kit }}
          # Parse mutmut output. mutmut groups results by emoji-tagged
          # status. We count killed (🎉) and survived (🙁) and report
          # the ratio. Other categories (timeout, suspicious, skipped)
          # are excluded from the score.
          REPORT="mutation_report.txt"
          if [ ! -f "$REPORT" ]; then
            echo "mutation_score=0" >> "$GITHUB_ENV"
            echo "killed=0" >> "$GITHUB_ENV"
            echo "survived=0" >> "$GITHUB_ENV"
            exit 0
          fi
          KILLED=$(grep -cE '^🎉|: killed' "$REPORT" || true)
          SURVIVED=$(grep -cE '^🙁|: survived' "$REPORT" || true)
          KILLED=${KILLED:-0}
          SURVIVED=${SURVIVED:-0}
          TOTAL=$((KILLED + SURVIVED))
          if [ "$TOTAL" -eq 0 ]; then
            SCORE=0
          else
            SCORE=$((KILLED * 100 / TOTAL))
          fi
          echo "mutation_score=$SCORE" >> "$GITHUB_ENV"
          echo "killed=$KILLED" >> "$GITHUB_ENV"
          echo "survived=$SURVIVED" >> "$GITHUB_ENV"
          echo "kit=${{ matrix.kit }}" >> "$GITHUB_ENV"

      - name: Append summary
        if: always()
        run: |
          {
            echo "## Mutation testing — ${{ matrix.kit }}"
            echo ""
            echo "| metric | value |"
            echo "|---|---|"
            echo "| score | ${mutation_score:-0}% |"
            echo "| killed | ${killed:-0} |"
            echo "| survived | ${survived:-0} |"
            echo ""
            if [ "${mutation_score:-0}" -lt 70 ]; then
              echo "⚠️  Score below the 70% target. See the uploaded \`mutation-report-${{ matrix.kit }}\` artifact for surviving mutants and add tests in the next sprint."
            else
              echo "✅ Score meets the 70% target."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-${{ matrix.kit }}
          path: kits/${{ matrix.kit }}/mutation_report.txt
          if-no-files-found: warn
          retention-days: 30
