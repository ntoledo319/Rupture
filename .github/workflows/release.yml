name: Reproducible Release (C4, C5)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-python-kits:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kit: [al2023-gate, python-pivot]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package and SBOM
        run: |
          python -m pip install --upgrade pip build setuptools wheel
          mkdir -p dist
          cd kits/${{ matrix.kit }}
          python -m build --no-isolation --sdist --wheel --outdir ../../dist
          python - <<'PY'
          import json
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project = pyproject["project"]
          sbom = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "version": 1,
              "metadata": {
                  "component": {
                      "type": "application",
                      "name": project["name"],
                      "version": project["version"],
                      "licenses": [{"license": {"id": "MIT"}}],
                  }
              },
              "components": [],
          }
          Path("../../dist", f"{project['name']}-sbom.json").write_text(
              json.dumps(sbom, indent=2) + "\n"
          )
          PY
          cd ../..
          sha256sum dist/* > dist/SHA256SUMS-${{ matrix.kit }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.kit }}
          path: dist/*

  build-node-kit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build package and SBOM
        run: |
          mkdir -p dist
          cd kits/lambda-lifeline
          npm ci
          npm pack --pack-destination ../../dist
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const pkg = require('./package.json');
          const sbom = {
            bomFormat: 'CycloneDX',
            specVersion: '1.5',
            version: 1,
            metadata: {
              component: {
                type: 'application',
                name: pkg.name,
                version: pkg.version,
                licenses: [{ license: { id: 'MIT' } }]
              }
            },
            components: Object.entries(pkg.dependencies || {}).map(([name, version]) => ({
              type: 'library',
              name,
              version
            }))
          };
          fs.writeFileSync(path.join('..', '..', 'dist', `${pkg.name}-sbom.json`), `${JSON.stringify(sbom, null, 2)}\n`);
          NODE
          cd ../..
          sha256sum dist/* > dist/SHA256SUMS-lambda-lifeline.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-lambda-lifeline
          path: dist/*

  verify-artifacts:
    runs-on: ubuntu-latest
    needs: [build-python-kits, build-node-kit]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Verify checksums exist
        run: |
          test -s dist/SHA256SUMS-al2023-gate.txt
          test -s dist/SHA256SUMS-python-pivot.txt
          test -s dist/SHA256SUMS-lambda-lifeline.txt
          find dist -type f -maxdepth 1 | sort

  sign-release:
    runs-on: ubuntu-latest
    needs: verify-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate combined checksums
        run: |
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          for artifact in dist/*; do
            if [ -f "$artifact" ] && [[ "$artifact" != *.sig ]]; then
              cosign sign-blob --yes "$artifact" --output-signature "${artifact}.sig"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Rupture Release ${{ github.ref_name }}

            ### Artifacts
            - Python wheels and source distributions for `al2023-gate` and `python-pivot`
            - npm package tarball for `lambda-lifeline`
            - CycloneDX SBOMs
            - SHA256 checksums
            - Sigstore signatures

            ### Verification
            ```bash
            cosign verify-blob --signature <artifact>.sig <artifact>
            sha256sum -c SHA256SUMS.txt
            ```
