name: Determinism CI Gate (C1)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  python-determinism:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - kit: al2023-gate
            module: al2023_gate.cli
            fixture: test/fixtures/inventory.json
          - kit: python-pivot
            module: python_pivot.cli
            fixture: test/fixtures/lambda-inventory.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install kit
        run: |
          cd kits/${{ matrix.kit }}
          pip install -e ".[dev]"
      - name: Run kit twice on same fixture
        run: |
          cd kits/${{ matrix.kit }}
          python -m ${{ matrix.module }} --no-banner scan --fixture ${{ matrix.fixture }} --format json > /tmp/run1.json
          python -m ${{ matrix.module }} --no-banner scan --fixture ${{ matrix.fixture }} --format json > /tmp/run2.json
          jq 'walk(if type == "object" then del(.timestamp, .generated_at) else . end)' /tmp/run1.json > /tmp/run1_normalized.json
          jq 'walk(if type == "object" then del(.timestamp, .generated_at) else . end)' /tmp/run2.json > /tmp/run2_normalized.json
          diff /tmp/run1_normalized.json /tmp/run2_normalized.json

  node-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd kits/lambda-lifeline
          npm ci
      - name: Run kit twice on same fixture
        run: |
          cd kits/lambda-lifeline
          node bin/cli.mjs scan --fixture test/fixtures/lambda-inventory.json --json > /tmp/run1.json
          node bin/cli.mjs scan --fixture test/fixtures/lambda-inventory.json --json > /tmp/run2.json
          jq 'walk(if type == "object" then del(.timestamp, .generated_at) else . end)' /tmp/run1.json > /tmp/run1_normalized.json
          jq 'walk(if type == "object" then del(.timestamp, .generated_at) else . end)' /tmp/run2.json > /tmp/run2_normalized.json
          diff /tmp/run1_normalized.json /tmp/run2_normalized.json
